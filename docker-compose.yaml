version: '3'

services:
  mongo:
    image: mongo
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    restart: always 
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongo

  node-app:
    # 🚀 CHANGED: Pulling your freshly verified, pre-bundled image straight from local ECR
    image: 127.0.0.1:5100/my-app:1.0
    ports:
      - 3000:3000
    # 🎯 REMOVED: volumes, working_dir, and command (everything is already baked inside your image)
    environment:
      - MONGO_URL=mongodb://admin:password@mongo:27017

volumes:
  mongo-data:
    driver: local